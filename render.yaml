services:
  - type: web
    name: whatsapp-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node baileys-bot.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PHONE_NUMBER
        value: 2348103741405
      - key: BUSINESS_NAME
        value: ENV
      - key: BUSINESS_HOURS_START
        value: "02:00"
      - key: BUSINESS_HOURS_END
        value: "24:00"
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: AUTO_REPLY_ENABLED
        value: "true"
      - key: AUTO_REPLY_DELAY
        value: "20"
      - key: ADMIN_NUMBER
        value: "07012796255"